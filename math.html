<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Math World</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/styles.css"></head><body>
<nav class="sitebar"><div class="nav"><a class="logo" href="index.html">🎀 ZEN'S CLUBHOUSE 🖤</a><a href="learn.html">⬅ Learn</a><a href="reading.html">📖 Reading</a></div></nav>
<main class="wrap"><header class="hero"><h1>🔢 MATH WORLD</h1><p>numbers, but cooler</p></header>
<section id="count" class="game"><h2>🛹 Count It</h2><div class="question" id="countObjects"></div><div class="question">How many?</div><div id="countAnswers" class="answers"></div><div id="countFeedback" class="feedback"></div><button class="btn" id="nextCount">NEXT</button></section>
<section id="number" class="game"><h2>💥 Find the Number</h2><div class="question" id="findQ"></div><div id="numberAnswers" class="answers"></div><div id="numberFeedback" class="feedback"></div><button class="btn" id="nextNumber">NEXT</button></section>
<section id="add" class="game"><h2>➕ Add It Up</h2><div class="question" id="addQ"></div><div id="addAnswers" class="answers"></div><div id="addFeedback" class="feedback"></div><button class="btn" id="nextAdd">NEXT</button><div class="parent-tip"><strong>💡 Grown-up help:</strong> Let Zen point to or count each object before choosing an answer. Concrete counting builds the meaning behind the equation.</div></section>
<section id="subtract" class="game"><h2>➖ Take It Away</h2><div class="question" id="subQ"></div><div id="subAnswers" class="answers"></div><div id="subFeedback" class="feedback"></div><button class="btn" id="nextSub">NEXT</button></section>
<section id="pattern" class="game"><h2>🔷 Pattern Game</h2><div class="question" id="patternQ"></div><div id="patternAnswers" class="answers"></div><div id="patternFeedback" class="feedback"></div><button class="btn" id="nextPattern">NEXT</button></section>
</main><script src="js/common.js"></script><script>
function opts(correct,max=10){let a=[correct];while(a.length<3){let n=Math.max(0,Math.min(max,correct+Math.floor(Math.random()*7)-3));if(!a.includes(n))a.push(n)}return a.sort(()=>Math.random()-.5)}
function renderAnswers(el,arr,correct,fb,skill){el.innerHTML="";fb.textContent="";arr.forEach(n=>{let b=document.createElement("button");b.className="answer";b.textContent=n;b.addEventListener("click",()=>{let ok=n===correct;ZEN.addStat(skill,ok);fb.textContent=ok?"⭐ YESSS!":"Almost — count it one more time.";if(ok){ZEN.star();ZEN.complete("math")}});el.appendChild(b)})}
function countRound(){let n=1+Math.floor(Math.random()*10);countObjects.textContent="🛹 ".repeat(n);renderAnswers(countAnswers,opts(n,10),n,countFeedback,"counting")}nextCount.addEventListener("click",countRound);countRound();
function numRound(){let n=Math.floor(Math.random()*11);findQ.textContent="Find "+n+"!";renderAnswers(numberAnswers,opts(n,10),n,numberFeedback,"numberRecognition")}nextNumber.addEventListener("click",numRound);numRound();
function addRound(){let a=1+Math.floor(Math.random()*5),b=1+Math.floor(Math.random()*5),c=a+b;addQ.textContent="🍓 ".repeat(a)+" + "+"🍓 ".repeat(b)+" = ?";renderAnswers(addAnswers,opts(c,10),c,addFeedback,"addition")}nextAdd.addEventListener("click",addRound);addRound();
function subRound(){let a=2+Math.floor(Math.random()*7),b=Math.floor(Math.random()*a),c=a-b;subQ.textContent=a+" 🛹 — "+b+" roll away = ?";renderAnswers(subAnswers,opts(c,10),c,subFeedback,"subtraction")}nextSub.addEventListener("click",subRound);subRound();
const pats=[["💗 🖤 💗 🖤 💗 __","🖤",["💗","🖤","⭐"]],["⭐ ⭐ 🌙 ⭐ ⭐ 🌙 __","⭐",["🌙","⭐","🖤"]],["🎀 🛹 🎀 🛹 __","🎀",["🛹","🎀","💗"]]];
function patRound(){let p=pats[Math.floor(Math.random()*pats.length)];patternQ.textContent=p[0];patternAnswers.innerHTML="";patternFeedback.textContent="";p[2].forEach(x=>{let b=document.createElement("button");b.className="answer";b.textContent=x;b.addEventListener("click",()=>{let ok=x===p[1];ZEN.addStat("patterns",ok);patternFeedback.textContent=ok?"🔷 PATTERN POWER!":"Look at what repeats.";if(ok){ZEN.star();ZEN.complete("math")}});patternAnswers.appendChild(b)})}nextPattern.addEventListener("click",patRound);patRound();
</script></body></html>
